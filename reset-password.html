<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1life Financial - Reset Password</title>
  <link rel="shortcut icon" href="https://1lifefinancial.com/assets/images/logoIcon/favicon.png" type="image/x-icon">
  <link rel="stylesheet" href="home_files/bootstrap.min.css">
  <link rel="stylesheet" href="home_files/all.min.css">
  <link rel="stylesheet" href="home_files/line-awesome.min.css">
  <link rel="stylesheet" href="home_files/custom.css">
  <link rel="stylesheet" href="home_files/main.css">
  <link rel="stylesheet" href="home_files/iziToast.min.css">
</head>
<body>
  <div class="main-wrapper">
    <section class="account-section bg_img" style="background-image: url('https://1lifefinancial.com/assets/images/frontend/login_bg/6110c9ec14e281628490220.jpg');">
      <div class="account-section-left">
        <div class="account-section-left-inner">
          <h4 class="title text-white mb-2">Reset Your Password</h4>
          <p class="text-white">Enter your new password below</p>
        </div>
      </div>
      
      <div class="account-section-right">
        <div class="top text-center">
          <a href="index.html" class="account-logo">
            <img src="https://1lifefinancial.com/assets/images/logoIcon/logo.png" alt="logo">
          </a>
        </div>
        
        <div class="middle">
          <form class="account-form" id="resetPasswordForm">
            <input type="hidden" id="token" name="token">
            
            <div class="form-group">
              <label for="newPassword">New Password *</label>
              <input type="password" name="newPassword" id="newPassword" placeholder="Enter new password" class="form--control" required minlength="6">
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirm Password *</label>
              <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Confirm new password" class="form--control" required minlength="6">
            </div>

            <button type="submit" class="btn btn--base w-100" id="resetBtn">
              <span id="resetBtnText">Reset Password</span>
              <span id="resetBtnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
            </button>
          </form>
        </div>
        
        <div class="bottom">
          <div class="row">
            <div class="col-12 text-center">
              <p class="text-white">© 2021 <a href="index.html" class="text--base">1life financial</a> All Right Reserved</p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="home_files/jquery-3.5.1.min.js"></script>
  <script src="home_files/bootstrap.bundle.min.js"></script>
  <script src="home_files/iziToast.min.js"></script>

  <script>
    function notify(status, message) {
      iziToast[status]({
        message: message,
        position: "topRight"
      });
    }

    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      notify('error', 'Invalid or missing reset token');
      setTimeout(() => {
        window.location.href = 'forgot-password.html';
      }, 2000);
    } else {
      document.getElementById('token').value = token;
    }

    document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const resetBtn = document.getElementById('resetBtn');
      const resetBtnText = document.getElementById('resetBtnText');
      const resetBtnSpinner = document.getElementById('resetBtnSpinner');
      
      if (newPassword !== confirmPassword) {
        notify('error', 'Passwords do not match');
        return;
      }

      if (newPassword.length < 6) {
        notify('error', 'Password must be at least 6 characters');
        return;
      }
      
      // Disable button
      resetBtn.disabled = true;
      resetBtnText.classList.add('d-none');
      resetBtnSpinner.classList.remove('d-none');
      
      // Call API
      fetch('api/reset-password.php', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ 
          token: token,
          password: newPassword 
        })
      })
      .then(response => response.json())
      .then(data => {
        resetBtn.disabled = false;
        resetBtnText.classList.remove('d-none');
        resetBtnSpinner.classList.add('d-none');
        
        if (data.success) {
          notify('success', data.message || 'Password reset successfully!');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          notify('error', data.message || 'Failed to reset password');
        }
      })
      .catch(error => {
        console.error('Error:', error);
        resetBtn.disabled = false;
        resetBtnText.classList.remove('d-none');
        resetBtnSpinner.classList.add('d-none');
        notify('error', 'An error occurred. Please try again.');
      });
    });
  </script>
</body>
</html>
