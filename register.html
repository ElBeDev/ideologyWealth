<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ideology Wealth Advisors - Sign Up</title>
  
  <!-- bootstrap 5 -->
  <link rel="stylesheet" href="Ideology Wealth Advisors - Sign Up_files/bootstrap.min.css">
  <!-- fontawesome 5 -->
  <link rel="stylesheet" href="Ideology Wealth Advisors - Sign Up_files/all.min.css">
  <!-- lineawesome font -->
  <link rel="stylesheet" href="Ideology Wealth Advisors - Sign Up_files/line-awesome.min.css">
  <link rel="stylesheet" href="Ideology Wealth Advisors - Sign Up_files/custom.css">
  <!-- main css -->
  <link rel="stylesheet" href="Ideology Wealth Advisors - Sign Up_files/main.css">
  <link rel="stylesheet" href="Ideology Wealth Advisors - Sign Up_files/color.php">
  <link rel="stylesheet" href="Ideology Wealth Advisors - Sign Up_files/iziToast.min.css">
  
  <style>
    .country-code .input-group-prepend .input-group-text{
        background: #fff !important;
    }
    .country-code select{
        border: none;
    }
    .country-code select:focus{
        border: none;
        outline: none;
    }
  </style>
</head>
<body>

  <div class="preloader" style="opacity: 0; display: none;">
    <div class="dl">
      <div class="dl__container">
        <div class="dl__corner--top"></div>
        <div class="dl__corner--bottom"></div>
      </div>
      <div class="dl__square"></div>
    </div>
  </div>

  <div class="main-wrapper">
    <section class="account-section registration-section bg_img" style="background-image: url('https://ideologywealthadvisors.com/assets/images/frontend/signup_bg/6110d5890dc201628493193.jpg');">
      <div class="account-section-left">
        <div class="account-section-left-inner">
          <h4 class="title text-white mb-2">Create an Account to Ideology Wealth Advisors</h4>
          <p class="text-white">Please provide your valid information to register!</p>
          <p class="mt-xl-5 mt-3 text-white">Have an account? <a href="login.html" class="text--base">Login here</a></p>
        </div>
      </div>
      
      <div class="account-section-right">
        <div class="top text-center">
          <a href="index.html" class="account-logo">
            <img src="https://ideologywealthadvisors.com/assets/images/logoIcon/logo.png" alt="logo">
          </a>
        </div>
        
        <div class="middle">
          <form class="account-form" id="registerForm" onsubmit="return submitUserForm();">
            <div class="row">
              
              <div class="col-lg-6 form-group">
                <label for="firstname">First Name *</label>
                <input id="firstname" placeholder="First Name" type="text" class="form--control" name="firstname" value="" required>
              </div>

              <div class="col-lg-6 form-group">
                <label for="lastname">Last Name *</label>
                <input id="lastname" placeholder="Last Name" type="text" class="form--control" name="lastname" value="" required>
              </div>

              <div class="col-lg-6 form-group">
                <label for="username">Username *</label>
                <input id="username" type="text" class="form--control checkUser" name="username" value="" placeholder="Enter username" required>
                <small class="text-danger usernameExist"></small>
              </div>
              
              <div class="col-lg-6 form-group">
                <label for="email">E-Mail Address *</label>
                <input id="email" type="email" class="form--control checkUser" name="email" value="" placeholder="Enter email address" required>
              </div>

              <div class="col-lg-6 form-group">
                <label for="country">Country *</label>
                <select name="country" id="country" class="form--control">
                  <option data-mobile_code="52" value="Mexico" data-code="MX" selected>Mexico</option>
                  <option data-mobile_code="1" value="United States" data-code="US">United States</option>
                  <option data-mobile_code="1" value="Canada" data-code="CA">Canada</option>
                  <option data-mobile_code="34" value="Spain" data-code="ES">Spain</option>
                  <option data-mobile_code="57" value="Colombia" data-code="CO">Colombia</option>
                  <option data-mobile_code="54" value="Argentina" data-code="AR">Argentina</option>
                  <option data-mobile_code="56" value="Chile" data-code="CL">Chile</option>
                  <option data-mobile_code="51" value="Peru" data-code="PE">Peru</option>
                </select>
              </div>

              <div class="col-lg-6 form-group">
                <label for="mobile">Mobile *</label>
                <div class="input-group">
                  <span class="input-group-text bg--base border--base text-white">
                    <span name="mobile" class="border-0 bg-transparent mobile-code">+52</span>
                    <input type="hidden" name="mobile_code" value="52">
                    <input type="hidden" name="country_code" value="MX">
                  </span>
                  <input type="text" name="mobile" id="mobile" value="" class="form--control checkUser" placeholder="Your Phone Number" required>
                </div>
                <small class="text-danger mobileExist"></small>
              </div>

              <div class="col-lg-6 form-group">
                <label for="city">City *</label>
                <input id="city" type="text" class="form--control" name="city" value="" placeholder="Enter City" required>
              </div>

              <div class="col-lg-6 form-group">
                <label for="state">State *</label>
                <input id="state" type="text" class="form--control" name="state" value="" placeholder="Enter State" required>
              </div>

              <div class="col-lg-6 form-group">
                <label for="zip">Zip Code *</label>
                <input id="zip" type="text" class="form--control" name="zip" value="" placeholder="Enter Zip" required>
              </div>

              <div class="col-lg-12 form-group">
                <label for="address">Address *</label>
                <input id="address" type="text" class="form--control" name="address" value="" placeholder="Enter Address" required>
              </div>

              <div class="col-lg-6 form-group hover-input-popup">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" autocomplete="off" class="form--control" placeholder="Enter Password" required>
              </div>
              
              <div class="col-lg-6 form-group">
                <label for="password-confirm">Confirm Password *</label>
                <input id="password-confirm" type="password" class="form--control" name="password_confirmation" required autocomplete="new-password" placeholder="Confirm password">
              </div>

              <div class="form-group col-lg-12">
                <div class="form-check custom--checkbox">
                  <input type="checkbox" class="form-check-input" id="agree" name="agree" required>
                  <label for="agree" class="form-check-label">
                    I agree with <a href="#" target="blank" class="text--base">Company Policy</a>, 
                    <a href="#" target="blank" class="text--base">Terms of Services</a>, 
                    <a href="#" target="blank" class="text--base">Privacy Policy</a>.
                  </label>
                </div>
              </div>

              <div class="col-lg-12">
                <button type="submit" class="btn btn--base text-white w-100" id="registerBtn">
                  <span id="registerBtnText">Sign Up</span>
                  <span id="registerBtnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                </button>
              </div>

            </div>
          </form>
        </div>
        
        <div class="bottom">
          <div class="row">
            <div class="col-xl-12">
              <ul class="d-flex flex-wrap align-items-center account-short-link justify-content-center">
                <li><a href="#">Company Policy</a>,</li>
                <li><a href="#">Terms of Services</a>,</li>
                <li><a href="#">Privacy Policy</a>.</li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- jQuery library -->
  <script src="Ideology Wealth Advisors - Sign Up_files/jquery-3.5.1.min.js"></script>
  <script src="Ideology Wealth Advisors - Sign Up_files/lightcase.js"></script>
  <script src="Ideology Wealth Advisors - Sign Up_files/bootstrap.bundle.min.js"></script>
  <script src="Ideology Wealth Advisors - Sign Up_files/slick.min.js"></script>
  <script src="Ideology Wealth Advisors - Sign Up_files/wow.min.js"></script>
  <script src="Ideology Wealth Advisors - Sign Up_files/secure_password.js"></script>
  <script src="Ideology Wealth Advisors - Sign Up_files/app.js"></script>
  <script src="Ideology Wealth Advisors - Sign Up_files/iziToast.min.js"></script>

  <script>
    "use strict";
    
    function notify(status, message) {
      if(typeof message == 'string'){
        iziToast[status]({
          message: message,
          position: "topRight"
        });
      }else{
        $.each(message, function(i, val) {
          iziToast[status]({
            message: val,
            position: "topRight"
          });
        });
      }
    }

    function submitUserForm() {
      event.preventDefault();
      
      const firstname = $('#firstname').val().trim();
      const lastname = $('#lastname').val().trim();
      const username = $('#username').val().trim();
      const email = $('#email').val().trim();
      const country = $('#country').val();
      const mobile = $('#mobile').val().trim();
      const city = $('#city').val().trim();
      const state = $('#state').val().trim();
      const zip = $('#zip').val().trim();
      const address = $('#address').val().trim();
      const password = $('#password').val();
      const confirm_password = $('#password-confirm').val();
      const agree = $('#agree').is(':checked');
      
      const registerBtn = $('#registerBtn');
      const registerBtnText = $('#registerBtnText');
      const registerBtnSpinner = $('#registerBtnSpinner');
      
      if (!firstname || !lastname || !username || !email || !mobile || !city || !state || !zip || !address || !password || !confirm_password) {
        notify('error', 'Please fill in all fields');
        return false;
      }
      
      if (password !== confirm_password) {
        notify('error', 'Passwords do not match');
        return false;
      }
      
      if (password.length < 6) {
        notify('error', 'Password must be at least 6 characters');
        return false;
      }
      
      if (!agree) {
        notify('error', 'You must accept the terms and conditions');
        return false;
      }
      
      if (!/^[a-zA-Z0-9]{4,40}$/.test(username)) {
        notify('error', 'Username must contain only letters and numbers (4-40 characters)');
        return false;
      }
      
      registerBtn.prop('disabled', true);
      registerBtnText.addClass('d-none');
      registerBtnSpinner.removeClass('d-none');
      
      $.ajax({
        url: '/api/register.php',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({
          firstname: firstname,
          lastname: lastname,
          username: username,
          email: email,
          country_code: $('input[name="country_code"]').val(),
          mobile: mobile,
          city: city,
          state: state,
          zip: zip,
          address: address,
          password: password,
          confirm_password: confirm_password
        }),
        success: function(data) {
          if (data.success) {
            if (data.pending_activation) {
              // Account pending admin approval - do NOT log in or redirect to dashboard
              notify('success', '✅ ' + (data.message || 'Registration successful! Your account is pending administrator approval.'));
              setTimeout(function() {
                window.location.href = 'login.html';
              }, 4000);
            } else {
              notify('success', data.message || 'Registration successful');
              localStorage.setItem('user', JSON.stringify(data.user));
              localStorage.setItem('logged_in', 'true');
              setTimeout(function() {
                window.location.href = 'dashboard.html';
              }, 1500);
            }
          } else {
            notify('error', data.message || 'Registration error');
            registerBtn.prop('disabled', false);
            registerBtnText.removeClass('d-none');
            registerBtnSpinner.addClass('d-none');
          }
        },
        error: function(xhr, status, error) {
          var msg = 'Connection error. Please try again.';
          if (xhr.responseJSON && xhr.responseJSON.message) {
            msg = xhr.responseJSON.message;
          }
          notify('error', msg);
          registerBtn.prop('disabled', false);
          registerBtnText.removeClass('d-none');
          registerBtnSpinner.addClass('d-none');
        }
      });
      
      return false;
    }
    
    (function ($) {
      $('select[name=country]').change(function(){
        $('input[name=mobile_code]').val($('select[name=country] :selected').data('mobile_code'));
        $('input[name=country_code]').val($('select[name=country] :selected').data('code'));
        $('.mobile-code').text('+'+$('select[name=country] :selected').data('mobile_code'));
      });
      $('input[name=mobile_code]').val($('select[name=country] :selected').data('mobile_code'));
      $('input[name=country_code]').val($('select[name=country] :selected').data('code'));
      $('.mobile-code').text('+'+$('select[name=country] :selected').data('mobile_code'));
    })(jQuery);

    // ── Auto-corrector de texto para nombres y campos de dirección ──────────
    (function () {
      // Tabla de corrección de acentos comunes (mayúsculas incorrectas → correctas)
      const accentMap = {
        'A': 'A', 'E': 'E', 'I': 'I', 'O': 'O', 'U': 'U',
        'a': 'a', 'e': 'e', 'i': 'i', 'o': 'o', 'u': 'u',
        'Á': 'Á', 'É': 'É', 'Í': 'Í', 'Ó': 'Ó', 'Ú': 'Ú',
        'á': 'á', 'é': 'é', 'í': 'í', 'ó': 'ó', 'ú': 'ú',
        'ñ': 'ñ', 'Ñ': 'Ñ', 'ü': 'ü', 'Ü': 'Ü'
      };

      // Capitalize the first letter of each word, preserving accents and special chars
      function toTitleCase(str) {
        if (!str) return str;
        return str
          .toLowerCase()
          // Capitalize after space, hyphen or apostrophe
          .replace(/(^|[\s\-'])([a-záéíóúàèìòùâêîôûäëïöüñ])/gu, function (match, sep, letter) {
            return sep + letter.toUpperCase();
          });
      }

      // Remove extra spaces
      function normalizeSpaces(str) {
        return str.replace(/\s{2,}/g, ' ').trim();
      }

      function autoCorrectName(field, doTrim) {
        const raw = field.value;
        // Only letters (including accented), spaces, hyphens and apostrophes
        const cleaned = raw.replace(/[^a-zA-ZáéíóúàèìòùâêîôûäëïöüñÁÉÍÓÚÀÈÌÒÙÂÊÎÔÛÄËÏÖÜÑ\s\-']/g, '');
        // On input: only collapse multiple spaces (keep trailing space so user can type next word)
        // On blur: full trim to clean up
        const normalized = doTrim ? normalizeSpaces(cleaned) : cleaned.replace(/\s{2,}/g, ' ');
        const corrected = toTitleCase(normalized);
        if (field.value !== corrected) {
          const pos = field.selectionStart;
          field.value = corrected;
          // Restore cursor position as best as we can
          try { field.setSelectionRange(pos, pos); } catch(e){}
        }
      }

      function autoCorrectCity(field) {
        const raw = field.value;
        const cleaned = raw.replace(/[^a-zA-ZáéíóúàèìòùâêîôûäëïöüñÁÉÍÓÚÀÈÌÒÙÂÊÎÔÛÄËÏÖÜÑ0-9\s\-'.]/g, '');
        const corrected = toTitleCase(normalizeSpaces(cleaned));
        if (field.value !== corrected) {
          field.value = corrected;
        }
      }

      // Attach to name fields (live correction on input event)
      ['firstname', 'lastname'].forEach(function (id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('input', function () { autoCorrectName(this, false); });
        el.addEventListener('blur', function () { autoCorrectName(this, true); });
        // Hint attributes for mobile keyboards
        el.setAttribute('autocorrect', 'on');
        el.setAttribute('autocapitalize', 'words');
        el.setAttribute('spellcheck', 'false');
      });

      // City / State fields – capitalize words, allow numbers
      ['city', 'state'].forEach(function (id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('blur', function () { autoCorrectCity(this); });
        el.setAttribute('autocapitalize', 'words');
      });

      // Lowercase+trim for email
      const emailEl = document.getElementById('email');
      if (emailEl) {
        emailEl.addEventListener('blur', function () {
          this.value = this.value.trim().toLowerCase();
        });
      }

      // Lowercase for username (only alphanumeric allowed by backend)
      const usernameEl = document.getElementById('username');
      if (usernameEl) {
        usernameEl.addEventListener('input', function () {
          const val = this.value;
          // Remove any character that isn't alphanumeric
          const cleaned = val.replace(/[^a-zA-Z0-9]/g, '');
          if (this.value !== cleaned) this.value = cleaned;
        });
      }
    })();
    // ────────────────────────────────────────────────────────────────────────
    
    if (localStorage.getItem('logged_in') === 'true') {
      window.location.href = 'dashboard.html';
    }
  </script>
  
</body>
