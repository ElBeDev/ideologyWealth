  <link rel="stylesheet" href="home_files/iziToast.min.css">
  <script src="home_files/iziToast.min.js"></script>

  <script>
    "use strict";
    
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(registration => {
            console.log('Service Worker registered successfully:', registration.scope);
          })
          .catch(error => {
            console.log('Service Worker registration failed:', error);
          });
      });
    }
    
    function notify(status, message) {
      if(typeof message == 'string'){
        iziToast[status]({
          message: message,
          position: "topRight"
        });
      } else {
        $.each(message, function(i, val) {
          iziToast[status]({
            message: val,
            position: "topRight"
          });
        });
      }
    }

    // Login form handler
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      const loginBtnText = document.getElementById('loginBtnText');
      const loginBtnSpinner = document.getElementById('loginBtnSpinner');
      
      // Validate inputs
      if (!username || !password) {
        notify('error', 'Please fill in all fields');
        return;
      }
      
      // Show loading
      loginBtn.disabled = true;
      loginBtnText.classList.add('d-none');
      loginBtnSpinner.classList.remove('d-none');
      
      try {
        const response = await fetch('/api/login.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            username: username,
            password: password
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          notify('success', data.message || 'Login successful');
          
          // Save user data and auth token to localStorage
          localStorage.setItem('user', JSON.stringify(data.user));
          localStorage.setItem('logged_in', 'true');
          if (data.auth_token) {
            localStorage.setItem('auth_token', data.auth_token);
          }
          
          // Redirect to dashboard after 1 second
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1000);
        } else {
          notify('error', data.message || 'Login error');
          loginBtn.disabled = false;
          loginBtnText.classList.remove('d-none');
          loginBtnSpinner.classList.add('d-none');
        }
      } catch (error) {
        console.error('Login error:', error);
        notify('error', 'Connection error. Please try again.');
        loginBtn.disabled = false;
        loginBtnText.classList.remove('d-none');
        loginBtnSpinner.classList.add('d-none');
      }
    });
    
    // Check if already logged in
    if (localStorage.getItem('logged_in') === 'true') {
      window.location.href = 'dashboard.html';
    }
  </script>
