<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Ideology Wealth Advisors</title>
    <link rel="stylesheet" href="Ideology Wealth Advisors - Dashboard_files/bootstrap.min.css">
    <link rel="stylesheet" href="Ideology Wealth Advisors - Dashboard_files/line-awesome.min.css">
    <link rel="stylesheet" href="Ideology Wealth Advisors - Dashboard_files/iziToast.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0d0d0d;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        /* Decorative gold line at top */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #d4af37, #f0d060, #b8941f);
        }

        .login-card {
            background: #1a1a1a;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            padding: 50px 45px;
            width: 100%;
            max-width: 460px;
        }

        .login-card__logo {
            text-align: center;
            margin-bottom: 35px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .login-card__logo img {
            max-width: 200px;
            height: auto;
        }

        .login-card h3 {
            text-align: center;
            color: #d4af37;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .login-card p {
            text-align: center;
            color: rgba(255,255,255,0.5);
            margin-bottom: 35px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.8);
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #d4af37;
            font-size: 18px;
            z-index: 1;
        }

        .form-control {
            width: 100%;
            padding: 13px 15px 13px 45px;
            background: #2a2a2a;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            font-size: 14px;
            color: #ffffff;
            transition: all 0.3s;
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .form-control:focus {
            outline: none;
            border-color: #d4af37;
            background: #2e2e2e;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
        }

        .btn--primary {
            width: 100%;
            padding: 14px;
            background: #d4af37;
            color: #1a1a1a;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .btn--primary:hover {
            background: #f0d060;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.35);
        }

        .btn--primary i {
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-card__logo">
            <img src="../branding/ideology-wealth-logo-white.png" alt="Ideology Wealth Advisors">
        </div>
        
        <h3>Admin Panel</h3>
        <p>Welcome back! Please login to your account.</p>
        
        <form id="adminLoginForm">
            <div class="form-group">
                <label>Username</label>
                <div class="input-group">
                    <i class="las la-user"></i>
                    <input type="text" class="form-control" id="username" placeholder="Enter your username" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <div class="input-group">
                    <i class="las la-lock"></i>
                    <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                </div>
            </div>
            
            <button type="submit" class="btn--primary">
                <i class="las la-sign-in-alt"></i> Login to Dashboard
            </button>
        </form>
    </div>

    <script src="Ideology Wealth Advisors - Dashboard_files/jquery-3.5.1.min.js"></script>
    <script src="Ideology Wealth Advisors - Dashboard_files/iziToast.min.js"></script>
    <script>
        function notify(s,m){iziToast[s]({message:m,position:"topRight"});}
        
        $('#adminLoginForm').on('submit', function(e){
            e.preventDefault();
            
            const username = $('#username').val();
            const password = $('#password').val();
            
            $.ajax({
                url: '/api/admin_login.php',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({username, password}),
                success: function(r){
                    if(r.success){
                        localStorage.setItem('admin_logged_in', 'true');
                        localStorage.setItem('admin_user', JSON.stringify(r.admin));
                        notify('success', 'Login successful!');
                        setTimeout(()=>window.location.href='dashboard.html', 1000);
                    }else{
                        notify('error', r.message || 'Invalid credentials');
                    }
                },
                error: function(){
                    notify('error', 'Connection error. Please try again.');
                }
            });
        });
        
        // Redirect if already logged in
        if(localStorage.getItem('admin_logged_in') === 'true'){
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
