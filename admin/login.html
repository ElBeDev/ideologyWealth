<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Ideology Wealth Advisors</title>
    <link rel="stylesheet" href="Ideology Wealth Advisors - Dashboard_files/bootstrap.min.css">
    <link rel="stylesheet" href="Ideology Wealth Advisors - Dashboard_files/line-awesome.min.css">
    <link rel="stylesheet" href="Ideology Wealth Advisors - Dashboard_files/iziToast.min.css">
    <style>
        :root {
            --primary-color: #0143a3;
            --dark-bg: #1a1d2e;
        }
        
        body {
            background: linear-gradient(135deg, #0143a3 0%, #1a1d2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        
        .login-card {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
        }
        
        .login-card__logo {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .login-card__logo img {
            max-width: 180px;
        }
        
        .login-card h3 {
            text-align: center;
            color: var(--dark-bg);
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .login-card p {
            text-align: center;
            color: #6c757d;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark-bg);
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(1,67,163,0.1);
        }
        
        .btn--primary {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn--primary:hover {
            background: #013380;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(1,67,163,0.3);
        }
        
        .input-group {
            position: relative;
        }
        
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
            font-size: 18px;
        }
        
        .input-group .form-control {
            padding-left: 45px;
        }
    </style>
    <link rel="stylesheet" href="../theme-black-gold.css">
</head>
<body>
    <div class="login-card">
        <div class="login-card__logo">
            <img src="Ideology Wealth Advisors - Dashboard_files/logo.png" alt="Ideology Wealth Advisors">
        </div>
        
        <h3>Admin Panel</h3>
        <p>Welcome back! Please login to your account.</p>
        
        <form id="adminLoginForm">
            <div class="form-group">
                <label>Username</label>
                <div class="input-group">
                    <i class="las la-user"></i>
                    <input type="text" class="form-control" id="username" placeholder="Enter your username" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <div class="input-group">
                    <i class="las la-lock"></i>
                    <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                </div>
            </div>
            
            <button type="submit" class="btn--primary">
                <i class="las la-sign-in-alt"></i> Login to Dashboard
            </button>
        </form>
    </div>

    <script src="Ideology Wealth Advisors - Dashboard_files/jquery-3.5.1.min.js"></script>
    <script src="Ideology Wealth Advisors - Dashboard_files/iziToast.min.js"></script>
    <script>
        function notify(s,m){iziToast[s]({message:m,position:"topRight"});}
        
        $('#adminLoginForm').on('submit', function(e){
            e.preventDefault();
            
            const username = $('#username').val();
            const password = $('#password').val();
            
            $.ajax({
                url: '/api/admin_login.php',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({username, password}),
                success: function(r){
                    if(r.success){
                        localStorage.setItem('admin_logged_in', 'true');
                        localStorage.setItem('admin_user', JSON.stringify(r.admin));
                        notify('success', 'Login successful!');
                        setTimeout(()=>window.location.href='dashboard.html', 1000);
                    }else{
                        notify('error', r.message || 'Invalid credentials');
                    }
                },
                error: function(){
                    notify('error', 'Connection error. Please try again.');
                }
            });
        });
        
        // Redirect if already logged in
        if(localStorage.getItem('admin_logged_in') === 'true'){
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
