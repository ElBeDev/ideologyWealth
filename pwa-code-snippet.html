
  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then((registration) => {
            console.log('Service Worker registered successfully:', registration.scope);
          })
          .catch((error) => {
            console.log('Service Worker registration failed:', error);
          });
      });
    }

    // PWA Install Prompt
    let deferredPrompt;
    const installButton = document.getElementById('pwa-install-btn');
    
    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevent the mini-infobar from appearing on mobile
      e.preventDefault();
      // Store the event so it can be triggered later
      deferredPrompt = e;
      // Show the install button
      if (installButton) {
        installButton.style.display = 'flex';
        console.log('PWA Install button shown');
      }
    });

    // Handle install button click
    if (installButton) {
      installButton.addEventListener('click', async () => {
        if (!deferredPrompt) {
          alert('Esta aplicación ya está instalada o tu navegador no soporta instalación PWA.');
          return;
        }
        // Show the install prompt
        deferredPrompt.prompt();
        // Wait for the user to respond to the prompt
        const { outcome } = await deferredPrompt.userChoice;
        console.log(`User response to the install prompt: ${outcome}`);
        
        // We've used the prompt, and can't use it again, throw it away
        deferredPrompt = null;
        // Hide the install button
        installButton.style.display = 'none';
      });
    }

    // Track PWA installation
    window.addEventListener('appinstalled', () => {
      console.log('PWA was installed');
      // Hide install button
      const installBtn = document.getElementById('pwa-install-btn');
      if (installBtn) {
        installBtn.style.display = 'none';
      }
      alert('¡Aplicación instalada exitosamente!');
    });

    // Check if app is running as PWA
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
      console.log('App is running as PWA');
      // Add PWA-specific styles or behavior
      document.body.classList.add('pwa-mode');
    }

    // Handle online/offline status
    window.addEventListener('online', () => {
      console.log('Back online');
      if (typeof notify === 'function') {
        notify('success', 'You are back online!');
      }
    });

    window.addEventListener('offline', () => {
      console.log('Gone offline');
      if (typeof notify === 'function') {
        notify('warning', 'You are offline. Some features may be limited.');
      }
    });
  </script>
