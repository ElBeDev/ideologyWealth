<svg width="1600" height="500" viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="iwBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0C2D86"/>
      <stop offset="100%" stop-color="#1E4ED9"/>
    </linearGradient>
    <linearGradient id="iwGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4EA144"/>
      <stop offset="100%" stop-color="#7AC95A"/>
    </linearGradient>
  </defs>

  <!-- Mark background ring -->
  <g transform="translate(50 40)">
    <polygon points="200,10 360,100 360,280 200,370 40,280 40,100" stroke="url(#iwBlue)" stroke-width="18"/>

    <!-- Stylized I -->
    <rect x="120" y="105" width="42" height="170" rx="18" fill="url(#iwBlue)"/>

    <!-- Stylized W bars -->
    <path d="M185 105 L225 250 L250 165 L275 250 L315 105" stroke="url(#iwGreen)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Upward wealth arrow -->
    <path d="M90 290 C145 250 205 240 285 205" stroke="url(#iwBlue)" stroke-width="18" stroke-linecap="round"/>
    <path d="M277 184 L313 201 L284 229" fill="none" stroke="url(#iwBlue)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(470 118)">
    <text x="0" y="120" font-family="Avenir Next, Montserrat, Poppins, sans-serif" font-size="108" font-weight="800" letter-spacing="4" fill="url(#iwBlue)">IDEOLOGY WEALTH</text>
    <text x="2" y="195" font-family="Avenir Next, Montserrat, Poppins, sans-serif" font-size="50" font-weight="700" letter-spacing="14" fill="url(#iwGreen)">ADVISORS, LLC</text>
    <rect x="0" y="232" width="860" height="10" rx="5" fill="url(#iwGreen)" opacity="0.85"/>
  </g>
</svg>
